<body>
  <script>
    // Anti-FOUC: apply theme before React hydrates so there is no flash.
    // Explicit saved choice wins; otherwise follow the OS/system color scheme.
    try {
      var t = localStorage.getItem("pp-theme");
      if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      if (t === "dark") document.body.dataset.theme = "dark";
    } catch (e) {}
  </script>
